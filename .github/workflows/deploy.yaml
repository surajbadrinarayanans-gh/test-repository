name: Deploy via OIDC

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO_NAME }}
          IMAGE_TAG: latest
        run: |
          if [ -z "$ECR_REGISTRY" ]; then echo "ECR_REGISTRY is empty"; exit 1; fi
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy via SSM (True Zero Downtime)
        run: |
          aws ssm send-command \
          --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
          --document-name "AWS-RunShellScript" \
          --parameters commands='[
            "set -e",
            "REGISTRY=${{ steps.login-ecr.outputs.registry }}",
            "REPO=${{ secrets.ECR_REPO_NAME }}",
            
            "echo \"Detecting active environment...\"",
            "ACTIVE_PORT=$(grep proxy_pass /etc/nginx/nginx.conf | grep -oE \"[0-9]+\" | head -1 || echo \"8082\")",
            "if [ \"$ACTIVE_PORT\" = \"8081\" ]; then NEW_PORT=8082; OLD_CONTAINER=app_blue; NEW_CONTAINER=app_green; else NEW_PORT=8081; OLD_CONTAINER=app_green; NEW_CONTAINER=app_blue; fi",
            
            "echo \"Logging into ECR on EC2...\"",
            "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY",
            
            "echo \"Pulling new image: $REGISTRY/$REPO:latest\"",
            "docker pull $REGISTRY/$REPO:latest",
            
            "echo \"Starting $NEW_CONTAINER on port $NEW_PORT...\"",
            "docker rm -f $NEW_CONTAINER || true",
            "docker run -d -p $NEW_PORT:80 --name $NEW_CONTAINER --restart unless-stopped $REGISTRY/$REPO:latest",
            
            "echo \"Waiting for health check...\"",
            "sleep 15",
            "curl -f http://localhost:$NEW_PORT || { echo \"Health check failed! Stopping deployment.\"; docker stop $NEW_CONTAINER; exit 1; }",
            
            "echo \"Updating Nginx and reloading...\"",
            "sudo sed -i \"s/$ACTIVE_PORT/$NEW_PORT/g\" /etc/nginx/nginx.conf",
            "sudo nginx -t && sudo nginx -s reload",
            
            "echo \"Deployment successful. Cleaning up $OLD_CONTAINER...\"",
            "docker stop $OLD_CONTAINER || true",
            "docker rm $OLD_CONTAINER || true"
          ]'