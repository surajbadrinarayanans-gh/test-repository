name: Deploy via OIDC (Blue-Green with ALB)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO_NAME }}
          IMAGE_TAG: latest
        run: |
          if [ -z "$ECR_REGISTRY" ]; then echo "ECR_REGISTRY is empty"; exit 1; fi
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # ─────────────────────────────────────────────
      # Step 1: Detect → Deploy → Switch → Cleanup (all in one)
      # Using secrets directly avoids GitHub output masking issues
      # ─────────────────────────────────────────────
      - name: Blue-Green Deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ secrets.ECR_REPO_NAME }}
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          LISTENER_ARN: ${{ secrets.ALB_LISTENER_ARN }}
          BLUE_TG_ARN: ${{ secrets.BLUE_TG_ARN }}
          GREEN_TG_ARN: ${{ secrets.GREEN_TG_ARN }}
          AWS_REGION_VAL: ${{ secrets.AWS_REGION }}
        run: |
          set -e

          echo "========================================="
          echo "  BLUE-GREEN DEPLOYMENT"
          echo "========================================="

          # ── Step 1: Detect active environment ──
          CURRENT_TG=$(aws elbv2 describe-listeners \
            --listener-arns "$LISTENER_ARN" \
            --query 'Listeners[0].DefaultActions[0].TargetGroupArn' \
            --output text)

          echo "Current listener TG: $CURRENT_TG"
          echo "Blue TG:  $BLUE_TG_ARN"
          echo "Green TG: $GREEN_TG_ARN"

          if [ "$CURRENT_TG" = "$BLUE_TG_ARN" ]; then
            ACTIVE=blue; NEW=green; NEW_PORT=8082; ACTIVE_PORT=8081
            NEW_TG="$GREEN_TG_ARN"
          else
            ACTIVE=green; NEW=blue; NEW_PORT=8081; ACTIVE_PORT=8082
            NEW_TG="$BLUE_TG_ARN"
          fi

          echo ""
          echo "Active: $ACTIVE (port $ACTIVE_PORT)"
          echo "Deploy: $NEW (port $NEW_PORT)"
          echo "Switch to TG: $NEW_TG"
          echo ""

          # ── Step 2: Deploy new container via SSM ──
          echo "Deploying app_$NEW on port $NEW_PORT..."

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands='[
              "set -e",
              "REGISTRY='"$ECR_REGISTRY"'",
              "REPO='"$ECR_REPO"'",
              "NEW='"$NEW"'",
              "NEW_PORT='"$NEW_PORT"'",

              "echo \"Deploying app_$NEW on port $NEW_PORT\"",

              "aws ecr get-login-password --region '"$AWS_REGION_VAL"' | docker login --username AWS --password-stdin $REGISTRY",
              "docker pull $REGISTRY/$REPO:latest",

              "docker rm -f app_$NEW 2>/dev/null || true",
              "docker run -d -p $NEW_PORT:80 --name app_$NEW --restart unless-stopped $REGISTRY/$REPO:latest",

              "sleep 10",
              "curl -sf http://localhost:$NEW_PORT/ || { echo \"HEALTH CHECK FAILED!\"; docker stop app_$NEW; docker rm app_$NEW; exit 1; }",
              "echo \"app_$NEW healthy on port $NEW_PORT!\""
            ]' \
            --output text --query 'Command.CommandId')

          echo "SSM Command: $COMMAND_ID"

          # Wait for SSM to finish
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "  [$i] $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Container deployed successfully!"
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "DEPLOYMENT FAILED!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done

          echo ""

          # ── Step 3: Switch ALB listener ──
          echo "Switching ALB listener to $NEW (TG: $NEW_TG)..."

          aws elbv2 modify-listener \
            --listener-arn "$LISTENER_ARN" \
            --default-actions Type=forward,TargetGroupArn="$NEW_TG"

          echo "Listener switched!"
          echo ""

          # ── Step 4: Wait for ALB to confirm healthy ──
          echo "Waiting for ALB health check on $NEW..."

          for i in $(seq 1 20); do
            HEALTH=$(aws elbv2 describe-target-health \
              --target-group-arn "$NEW_TG" \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text 2>/dev/null || echo "unknown")
            echo "  [$i] $HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "ALB confirmed $NEW is healthy!"
              break
            fi
            sleep 10
          done

          echo ""

          # ── Step 5: Cleanup old container ──
          echo "Stopping old container app_$ACTIVE..."
          sleep 10

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "docker stop app_'"$ACTIVE"' 2>/dev/null || true",
              "docker rm app_'"$ACTIVE"' 2>/dev/null || true",
              "echo \"Removed app_'"$ACTIVE"'\""
            ]'

          echo ""
          echo "========================================="
          echo "  DEPLOYMENT COMPLETE!"
          echo "  Traffic: app_$NEW via ALB"
          echo "========================================="
