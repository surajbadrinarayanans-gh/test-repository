name: Deploy via OIDC (Private EC2 + ALB)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO_NAME }}
          IMAGE_TAG: latest
        run: |
          if [ -z "$ECR_REGISTRY" ]; then echo "ECR_REGISTRY is empty"; exit 1; fi
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy via SSM (Blue-Green on Private EC2)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands='[
              "set -e",
              "REGISTRY='"$ECR_REGISTRY"'",
              "REPO=${{ secrets.ECR_REPO_NAME }}",

              "echo \"=== Blue-Green Deployment Starting ===\"",

              "echo \"Detecting active container...\"",
              "BLUE_RUNNING=$(docker ps --filter name=app_blue --format {{.Names}} | head -1 || true)",
              "GREEN_RUNNING=$(docker ps --filter name=app_green --format {{.Names}} | head -1 || true)",

              "if [ -n \"$BLUE_RUNNING\" ]; then ACTIVE=blue; NEW=green; ACTIVE_PORT=8081; NEW_PORT=8082; elif [ -n \"$GREEN_RUNNING\" ]; then ACTIVE=green; NEW=blue; ACTIVE_PORT=8082; NEW_PORT=8081; else ACTIVE=none; NEW=blue; ACTIVE_PORT=0; NEW_PORT=8081; fi",

              "echo \"Active: $ACTIVE ($ACTIVE_PORT) | Deploying: $NEW ($NEW_PORT)\"",

              "echo \"Logging into ECR via VPC endpoint...\"",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY",

              "echo \"Pulling image: $REGISTRY/$REPO:latest\"",
              "docker pull $REGISTRY/$REPO:latest",

              "echo \"Starting app_$NEW on port $NEW_PORT...\"",
              "docker rm -f app_$NEW 2>/dev/null || true",
              "docker run -d -p $NEW_PORT:80 --name app_$NEW --restart unless-stopped $REGISTRY/$REPO:latest",

              "echo \"Waiting for container health check (20s)...\"",
              "sleep 20",
              "curl -sf http://localhost:$NEW_PORT/ || { echo \"HEALTH CHECK FAILED! Rolling back.\"; docker stop app_$NEW; docker rm app_$NEW; exit 1; }",
              "echo \"Health check passed!\"",

              "echo \"Stopping old container app_$ACTIVE...\"",
              "if [ \"$ACTIVE\" != \"none\" ]; then docker stop app_$ACTIVE || true; docker rm app_$ACTIVE || true; fi",

              "echo \"=== Deployment Complete! app_$NEW running on port $NEW_PORT ===\""
            ]' \
            --output text --query 'Command.CommandId')

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for the command to complete
          echo "Waiting for deployment to finish..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "  Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardOutputContent' --output text
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for deployment"
          exit 1
