name: Deploy via OIDC (Blue-Green with ALB)

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPO_NAME }}
          IMAGE_TAG: latest
        run: |
          if [ -z "$ECR_REGISTRY" ]; then echo "ECR_REGISTRY is empty"; exit 1; fi
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG ./app
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # ─────────────────────────────────────────────
      # Step 1: Determine which color is currently active
      # ─────────────────────────────────────────────
      - name: Detect Active Environment
        id: detect
        env:
          LISTENER_ARN: ${{ secrets.ALB_LISTENER_ARN }}
          BLUE_TG_ARN: ${{ secrets.BLUE_TG_ARN }}
          GREEN_TG_ARN: ${{ secrets.GREEN_TG_ARN }}
        run: |
          CURRENT_TG=$(aws elbv2 describe-listeners \
            --listener-arns "$LISTENER_ARN" \
            --query 'Listeners[0].DefaultActions[0].TargetGroupArn' \
            --output text)

          echo "Current TG: $CURRENT_TG"

          if [ "$CURRENT_TG" = "$BLUE_TG_ARN" ]; then
            echo "active=blue"        >> $GITHUB_OUTPUT
            echo "new=green"           >> $GITHUB_OUTPUT
            echo "active_port=8081"    >> $GITHUB_OUTPUT
            echo "new_port=8082"       >> $GITHUB_OUTPUT
            echo "new_tg=$GREEN_TG_ARN" >> $GITHUB_OUTPUT
          else
            echo "active=green"        >> $GITHUB_OUTPUT
            echo "new=blue"            >> $GITHUB_OUTPUT
            echo "active_port=8082"    >> $GITHUB_OUTPUT
            echo "new_port=8081"       >> $GITHUB_OUTPUT
            echo "new_tg=$BLUE_TG_ARN" >> $GITHUB_OUTPUT
          fi

      # ─────────────────────────────────────────────
      # Step 2: Deploy new container via SSM
      # ─────────────────────────────────────────────
      - name: Deploy New Container via SSM
        id: deploy
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          NEW_COLOR: ${{ steps.detect.outputs.new }}
          NEW_PORT: ${{ steps.detect.outputs.new_port }}
          ACTIVE_COLOR: ${{ steps.detect.outputs.active }}
        run: |
          echo "Active: $ACTIVE_COLOR | Deploying: $NEW_COLOR (port $NEW_PORT)"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --timeout-seconds 300 \
            --parameters commands='[
              "set -e",
              "REGISTRY='"$ECR_REGISTRY"'",
              "REPO=${{ secrets.ECR_REPO_NAME }}",
              "NEW_COLOR='"$NEW_COLOR"'",
              "NEW_PORT='"$NEW_PORT"'",

              "echo \"=== Blue-Green Deployment ===\"",
              "echo \"Deploying: app_$NEW_COLOR on port $NEW_PORT\"",

              "echo \"Logging into ECR via VPC endpoint...\"",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin $REGISTRY",

              "echo \"Pulling image...\"",
              "docker pull $REGISTRY/$REPO:latest",

              "echo \"Starting app_$NEW_COLOR on port $NEW_PORT...\"",
              "docker rm -f app_$NEW_COLOR 2>/dev/null || true",
              "docker run -d -p $NEW_PORT:80 --name app_$NEW_COLOR --restart unless-stopped $REGISTRY/$REPO:latest",

              "echo \"Waiting for container health check (10s)...\"",
              "sleep 10",
              "curl -sf http://localhost:$NEW_PORT/ || { echo \"HEALTH CHECK FAILED!\"; docker stop app_$NEW_COLOR; docker rm app_$NEW_COLOR; exit 1; }",

              "echo \"Container app_$NEW_COLOR is healthy on port $NEW_PORT!\""
            ]' \
            --output text --query 'Command.CommandId')

          echo "command_id=$COMMAND_ID" >> $GITHUB_OUTPUT
          echo "SSM Command ID: $COMMAND_ID"

          echo "Waiting for container deployment..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query 'Status' --output text 2>/dev/null || echo "Pending")
            echo "  Attempt $i: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Container deployed successfully!"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardOutputContent' --output text
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment FAILED with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query 'StandardErrorContent' --output text
              exit 1
            fi
            sleep 10
          done

      # ─────────────────────────────────────────────
      # Step 3: Wait for ALB to mark new target as HEALTHY
      # This is the key step that prevents 502 errors!
      # ─────────────────────────────────────────────
      - name: Wait for ALB Target Healthy
        env:
          NEW_TG: ${{ steps.detect.outputs.new_tg }}
          NEW_COLOR: ${{ steps.detect.outputs.new }}
        run: |
          echo "Waiting for ALB to mark $NEW_COLOR target as healthy..."

          for i in $(seq 1 30); do
            HEALTH=$(aws elbv2 describe-target-health \
              --target-group-arn "$NEW_TG" \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text 2>/dev/null || echo "unknown")
            echo "  Check $i: $HEALTH"

            if [ "$HEALTH" = "healthy" ]; then
              echo "Target $NEW_COLOR is HEALTHY in ALB!"
              break
            fi

            if [ "$i" = "30" ]; then
              echo "ERROR: Target never became healthy after 5 minutes"
              exit 1
            fi

            sleep 10
          done

      # ─────────────────────────────────────────────
      # Step 4: Switch ALB listener — ONLY after target is healthy
      # ─────────────────────────────────────────────
      - name: Switch ALB to New Target Group
        env:
          LISTENER_ARN: ${{ secrets.ALB_LISTENER_ARN }}
          NEW_TG: ${{ steps.detect.outputs.new_tg }}
          NEW_COLOR: ${{ steps.detect.outputs.new }}
        run: |
          echo "Switching ALB listener to $NEW_COLOR target group..."

          aws elbv2 modify-listener \
            --listener-arn "$LISTENER_ARN" \
            --default-actions Type=forward,TargetGroupArn="$NEW_TG"

          echo "ALB now routing traffic to $NEW_COLOR! Zero downtime achieved."

      # ─────────────────────────────────────────────
      # Step 5: Drain connections, then stop old container
      # ─────────────────────────────────────────────
      - name: Cleanup Old Container
        env:
          ACTIVE_COLOR: ${{ steps.detect.outputs.active }}
          NEW_COLOR: ${{ steps.detect.outputs.new }}
        run: |
          echo "Waiting 15s for in-flight requests to drain from $ACTIVE_COLOR..."
          sleep 15

          echo "Stopping old container app_$ACTIVE_COLOR..."
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "docker stop app_'"$ACTIVE_COLOR"' 2>/dev/null || true",
              "docker rm app_'"$ACTIVE_COLOR"' 2>/dev/null || true",
              "echo \"Old container app_'"$ACTIVE_COLOR"' removed.\""
            ]'

          echo ""
          echo "========================================="
          echo "  DEPLOYMENT COMPLETE!"
          echo "  Traffic: app_$NEW_COLOR via ALB"
          echo "========================================="
